<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Dubbing Player</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="../shared/global.css">
<link rel="stylesheet" href="player.css">
</head>

<body class="player-body">

    <div id="exportOverlay" class="export-overlay" style="display:none;">
        <div class="export-content">
            <h3>Export en cours</h3>
            <p>On assemble ta voix avec l'extrait original...</p>
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-track"><div class="loading-bar"></div></div>
        </div>
    </div>

<div class="player-container">

    <h2 id="sceneTitle"></h2>

    <div class="video-wrapper">
        <video id="video" controls></video>
        <div id="countdown" class="countdown"></div>
    </div>

    <div class="controls">

        <button id="startBtn" disabled>
            Start dubbing
        </button>

        <button id="backBtn">
            Back
        </button>

    </div>

</div>

<script src="../services/recorder.js"></script>
<script src="player.js"></script>

</body>
</html>
