<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Settings</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="../shared/global.css">
<link rel="stylesheet" href="settings.css">
</head>

<body>

<header class="settings-header">
    <button id="backBtn" class="back-btn">Retour</button>
    <h1>Parametres</h1>
</header>

<main>
    <section class="settings-card">
        <h2>Configuration</h2>

        <div class="settings-section">
            <label for="libraryPath">Dossier des extraits</label>
            <div class="settings-row compact-row">
                <input id="libraryPath" type="text" readonly>
                <button id="browseLibrary">Parcourir</button>
            </div>
        </div>

        <div class="settings-section">
            <label for="microphoneSelect">Microphone</label>
            <div class="settings-row compact-row">
                <select id="microphoneSelect"></select>
                <button id="testMicBtn" type="button">Tester le micro</button>
            </div>

            <div class="mic-test">
                <div class="meter-track">
                    <div id="meterLevel" class="meter-level"></div>
                </div>
                <p id="micTestStatus" class="mic-status">Selectionne un micro puis lance le test.</p>
            </div>
        </div>

        <div class="actions-row">
            <button id="saveBtn">Enregistrer</button>
        </div>
    </section>
</main>

<script src="settings.js"></script>

</body>
</html>
